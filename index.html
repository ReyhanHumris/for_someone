<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Zizaa ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --bg: #fff5f7;
            --font-hand: 'Caveat', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            overflow: hidden;
            height: 100vh;
        }

        /* --- 1. SUPER INTERACTIVE LOADING SCREEN --- */
        #lock-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 1.5s cubic-bezier(1, 0, 0, 1);
        }

        /* Animasi Nama Zizaa */
        .zizaa-name {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 2px 2px 15px rgba(255, 77, 109, 0.2);
            background: linear-gradient(to right, #ff4d6d 20%, #ff85a1 40%, #ff85a1 60%, #ff4d6d 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .loader-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 40px;
            border: 2px solid white;
            text-align: center;
            width: 85%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        #countdown {
            font-family: var(--font-hand);
            font-size: 2.8rem;
            color: #444;
            margin-bottom: 20px;
        }

        .heart-bubble {
            position: absolute;
            cursor: pointer;
            animation: floatBubble 6s linear infinite;
            z-index: 5;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05));
        }

        @keyframes floatBubble {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-20vh) translateX(50px); opacity: 0; }
        }

        .perc-text {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 700;
            margin-top: 10px;
            font-family: var(--font-hand);
        }

        /* --- 2. MAIN CONTENT --- */
        #main-content {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .photo-card {
            position: absolute;
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 5px;
            animation: cardAppear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardAppear {
            0% { transform: scale(0) rotate(-15deg); }
            100% { transform: scale(1) rotate(var(--r)); }
        }

        /* --- 3. FINAL MESSAGE --- */
        #final-page {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: white;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 2s;
        }

        .envelope {
            width: 85%;
            max-width: 450px;
            padding: 30px;
            border: 2px solid #ffcad4;
            border-radius: 20px;
            text-align: center;
        }

        .music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--primary);
            color: white;
            border: none;
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 11000;
            font-size: 1.2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div id="bubble-container"></div>
        
        <h1 class="zizaa-name">Special for Zizaa ❤️</h1>
        
        <div class="loader-card">
            <p style="font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 10px;">WILL BE OPENED IN:</p>
            <div id="countdown">00:00:00:00</div>
            
            <div style="width: 100%; height: 8px; background: #eee; border-radius: 10px; overflow: hidden;">
                <div id="loading-bar" style="width: 0%; height: 100%; background: var(--primary); transition: 0.5s;"></div>
            </div>
            <div id="perc-label" class="perc-text">Menyiapkan kasih sayang... 0%</div>
        </div>
        
        <p style="margin-top: 30px; color: var(--secondary); font-family: var(--font-hand); font-size: 1.2rem;">
            "Pecahin gelembungnya sambil nunggu ya!"
        </p>
    </div>

    <div id="main-content">
        <div id="click-area" style="width: 100%; height: 100%;">
            <div style="position: absolute; top: 10%; width: 100%; text-align: center; font-family: var(--font-hand); font-size: 2rem; color: var(--primary);">
                Tap di mana saja, Zizaa! 🎁
            </div>
            <div id="cards-wrapper"></div>
        </div>
    </div>

    <div id="final-page">
        <div class="envelope">
            <h1 style="font-family: 'Dancing Script'; color: var(--primary); margin-bottom: 20px;">HBD Sayang! 🎂</h1>
            <p id="typewriter" style="line-height: 1.8; color: #444; font-family: 'Quicksand';"></p>
        </div>
    </div>

    <button class="music-btn" id="musicBtn">🎵</button>
    <audio id="bgMusic" src="Nadhif Basalamah - penjaga hati (Lirik).mp3" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        // CONFIG
        const targetDate = new Date("april 18, 2026 00:00:00").getTime();
        const createdDate = new Date("April 20, 2026 00:00:00").getTime();

        const messages = [
            { img: 'foto-1.jpg', txt: 'Hai Zizaa! 👋' },
            { img: 'foto-2.jpg', txt: 'Kamu cantik bgt hari ini ❤️' },
            { img: 'foto-3.jpg', txt: 'Senyum terus yaa 😊' },
            { img: 'foto-4.jpg', txt: 'Semangat belajar-nya! 💪' },
            { img: 'foto-5.jpg', txt: 'Rehan selalu ada buat kamu 🤝' },
            { img: 'foto-6.jpg', txt: 'My Sunshine ☀️' },
            { img: 'foto-7.jpg', txt: 'Satu lagi... 🔜' }
        ];

        const letterText = "Zizaa sayang... Selamat ulang tahun ya! Terima kasih sudah hadir dan jadi alasan Rehan buat semangat terus tiap hari. Semoga di umur baru ini kamu makin bahagia, kurang - kurangi insecurenya yaa sukses terus sekolahnya, dan kita bisa terus bareng-bareng. I love you so much! ❤️";

        // GENERATE BUBBLES
        function createBubble() {
            const container = document.getElementById('bubble-container');
            const bubble = document.createElement('div');
            bubble.className = 'heart-bubble';
            bubble.innerHTML = '❤️';
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.fontSize = (Math.random() * 20 + 20) + 'px';
            bubble.style.animationDuration = (Math.random() * 3 + 4) + 's';
            
            bubble.onclick = (e) => {
                confetti({ particleCount: 10, spread: 30, origin: { x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight }, colors: ['#ff4d6d'] });
                bubble.remove();
            };
            
            container.appendChild(bubble);
            setTimeout(() => bubble.remove(), 7000);
        }
        setInterval(createBubble, 800);

        // COUNTDOWN & PROGRESS BAR
        function updateLoader() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            // Progress Bar Logic
            const totalDuration = targetDate - createdDate;
            const elapsed = now - createdDate;
            const progress = Math.min(Math.floor((elapsed / totalDuration) * 100), 100);
            
            document.getElementById('loading-bar').style.width = progress + '%';
            document.getElementById('perc-label').innerText = `Menyiapkan kasih sayang Rehan... ${progress}%`;

            if (diff <= 0) {
                document.getElementById('lock-screen').style.transform = 'translateY(-100%)';
                setTimeout(() => {
                    document.getElementById('lock-screen').classList.add('hidden');
                    document.getElementById('main-content').style.display = 'block';
                }, 1000);
                return true;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerHTML = `${d}d ${h}h ${m}m ${s}s`;
            return false;
        }
        setInterval(updateLoader, 1000);
        updateLoader();

        // MAIN INTERACTION
        let index = 0;
        const music = document.getElementById('bgMusic');

        document.getElementById('click-area').addEventListener('click', (e) => {
            if (music.paused) music.play();
            if (index < messages.length) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.style.left = (e.clientX - 75) + 'px';
                card.style.top = (e.clientY - 75) + 'px';
                const r = Math.random() * 20 - 10;
                card.style.setProperty('--r', r + 'deg');
                card.style.transform = `rotate(${r}deg)`;
                
                card.innerHTML = `
                    <img src="${messages[index].img}" style="width:130px; height:130px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/130/ff4d6d/ffffff?text=Zizaa'">
                    <p style="font-family: var(--font-hand); text-align:center; margin-top:10px;">${messages[index].txt}</p>
                `;
                document.getElementById('cards-wrapper').appendChild(card);
                index++;

                if (index === messages.length) {
                    setTimeout(() => {
                        document.getElementById('final-page').style.display = 'flex';
                        setTimeout(() => {
                            document.getElementById('final-page').style.opacity = '1';
                            typeWriter();
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        }, 100);
                    }, 2000);
                }
            }
        });

        function typeWriter() {
            let i = 0;
            function type() {
                if (i < letterText.length) {
                    document.getElementById("typewriter").innerHTML += letterText.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }

        document.getElementById('musicBtn').onclick = (e) => {
            e.stopPropagation();
            music.paused ? music.play() : music.pause();
        };
    </script>
</body>
</html>
